<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>africantech | erp stocks</title>
    
    <!-- BLOQUEIO DE RENDERIZAÇÃO: Só liberta via JS após confirmar login -->
    <style>
        #app-shell { display: none; }
        .loading-screen { 
            height: 100vh; width: 100vw; display: flex; 
            justify-content: center; align-items: center; 
            background: #000d1a; color: white; font-family: sans-serif;
        }
    </style>

 <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/stock.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/notificacoes.css">
<link rel="stylesheet" href="css/projetos.css">
<link rel="stylesheet" href="css/perfil.css">   
<link rel="stylesheet" href="css/movimentos.css">  
<link rel="stylesheet" href="css/projetos.css">    
<link rel="stylesheet" href="css/usuarios.css">   
</head>
<body id="app-body">

    <!-- Tela de espera inicial -->
    <div id="loading-overlay" class="loading-screen">
        <div>a validar acesso seguro...</div>
    </div>

    <!-- O sistema todo dentro deste ID -->
    <div id="app-shell" style="flex-direction: column; height: 100vh; width: 100vw;">
        
<nav class="toolbar">
    <div class="logo-area">
        <img src="assets/logo.png" class="nav-logo">
        <span class="logo-text">AFRICANTECH</span>
    </div>

    <div class="menu-items" id="nav-main-menu">
        <button onclick="navegar('dashboard')" id="btn-dashboard">painel principal</button>
        <button onclick="navegar('stock')" id="btn-stock">inventário</button>
        <button onclick="navegar('movimentos')" id="btn-movimentos">movimentações</button>
        <button onclick="navegar('provincias')" id="btn-provincias" class="admin-only">unidades</button>
        <button onclick="navegar('usuarios')" id="btn-usuarios" class="admin-only">utilizadores</button>
    </div>

    <div class="header-right" style="display:flex; align-items:center; gap:15px; margin-left:auto;">
        <!-- NOTIFICAÇÕES -->
        <div class="notif-container" onclick="toggleNotificacoes(event)">
            🔔<span class="notif-badge" id="notif-count">0</span>
            <div id="notif-panel" class="notif-panel">
                <div class="notif-header">notificações</div>
                <div id="notif-list"></div>
            </div>
        </div>

        <!-- PERFIL -->
        <div class="user-profile-nav" onclick="navegar('perfil')" id="nav-perfil-block">
            <div class="avatar-circle">
                <img src="" id="nav-user-photo" style="display:none;" class="nav-avatar-img">
                <span id="nav-avatar-initials"></span>
            </div>
            <div class="user-info-text">
                <span id="user-display-name"></span>
                <small id="user-display-role"></small>
            </div>
        </div>

        <button onclick="fecharSessao()" class="btn-logout">sair</button>
    </div>
</nav>
        <main id="main-content">
            <!-- As telas renderizam aqui -->
        </main>

        <footer class="erp-footer" id="main-footer">
            <!-- Totais renderizam aqui -->
        </footer>
    </div>

    <!-- Modal de Confirmação -->
    <div id="modal-confirmacao" class="modal">
    <div class="modal-content" style="width: 350px; margin-top: 15vh;">
        <div class="modal-header" style="background: #f8f8f8;">
            <h3 id="confirm-titulo" style="margin:0; font-size:14px; color:var(--primary-dark);">confirmação</h3>
        </div>
        <div class="modal-body" style="text-align: center; padding: 30px 20px;">
            <p id="confirm-mensagem" style="margin:0; font-size:13px; color:var(--text-main);">deseja realmente sair do sistema?</p>
        </div>
        <div class="modal-footer" style="background: #f3f2f1; display: flex; justify-content: center; gap: 10px;">
            <button class="btn-primary" id="confirm-btn-ok" style="background: var(--primary);">sim, continuar</button>
            <button class="btn-primavera" id="confirm-btn-cancelar">cancelar</button>
        </div>
    </div>
</div>


    <!-- 1. Dependências Externas -->
    <!-- <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script> -->
    
    <!-- 2. Configuração de Base -->
    <script src="js/api.js"></script>

    <!-- 3. Módulos de Componentes  -->
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/stock.js"></script>
    <script src="js/modules/usuarios.js"></script>
    <script src="js/modules/movimentos.js"></script>
    <script src="js/modules/provincias.js"></script>
    <script src="js/modules/perfil.js"></script>
    <script src="js/modules/ranking.js"></script>
    <script src="js/modules/projetos.js"></script>

    <!-- 4. MOTOR PRINCIPAL  -->
    <script src="js/main.js"></script>
</body>
</html>
